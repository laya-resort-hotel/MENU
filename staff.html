<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Order</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="staff">
  <div class="shell page-shell staff-shell">
    <header class="topbar">
      <a href="index.html" class="brand-block">
        <span class="brand-kicker" id="staffOutletBrand">THE TASTE</span>
        <strong>Staff Ordering</strong>
      </a>
      <div class="topbar-actions">
        <div class="lang-switch" id="staffOutletSwitch"></div>
        <div class="user-pill" id="staffUserPill">Not logged in</div>
        <button class="btn small" id="staffLogoutBtn">Logout</button>
      </div>
    </header>

    <section id="staffApp" class="hidden">
      <div class="staff-form-grid card soft">
        <label><span>Table / Seat</span><input id="seatNo" type="text" placeholder="A1" /></label>
        <label><span>Room No.</span><input id="roomNo" type="text" placeholder="2305" /></label>
        <label><span>Guests</span><input id="guestCount" type="number" min="1" value="2" /></label>
        <label><span>Payment</span>
          <select id="paymentType">
            <option value="cash">Cash</option>
            <option value="credit_card">Credit Card</option>
            <option value="qr">QR</option>
          </select>
        </label>
        <label class="full"><span>General Comment</span><input id="generalComment" type="text" placeholder="Serve together / VIP guest / allergy note" /></label>
      </div>

      <div class="section-intro" style="padding:18px 0 0">
        <h1 id="staffOutletHeading" style="font-size:30px;margin:0">The Taste Staff Ordering</h1>
        <p style="margin:6px 0 0;color:var(--muted)">เลือก outlet ก่อนรับออเดอร์ เพื่อแยกเมนูและส่งขึ้นบอร์ดให้ถูกห้องอาหาร</p>
      </div>

      <div class="toolbar compact-toolbar">
        <div class="lang-switch" id="staffLanguageSwitch"></div>
        <div id="staffCategoryTabs" class="category-tabs"></div>
        <input id="staffSearch" class="search-input" type="text" placeholder="Search menu..." />
      </div>

      <div class="staff-layout">
        <section>
          <div id="staffMenuGrid" class="menu-grid staff-menu-grid"></div>
        </section>
        <aside class="cart-panel card">
          <div class="cart-header">
            <h2>Order Cart</h2>
            <button class="btn tiny ghost" id="clearCartBtn">Clear</button>
          </div>
          <div class="cart-meta" id="cartMeta"></div>
          <div id="cartItems" class="cart-items"></div>
          <div class="cart-footer">
            <div class="summary-row"><span>Subtotal</span><strong id="cartSubtotal">THB 0</strong></div>
            <button class="btn primary full" id="sendOrderBtn">Send to Board</button>
          </div>
        </aside>
      </div>
    </section>
  </div>

  <div id="staffLoginModal" class="modal hidden"></div>
  <div id="noteModal" class="modal hidden"></div>
  <script type="module" src="assets/app-firebase.js"></script>
</body>
</html>
