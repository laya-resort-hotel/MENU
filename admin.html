<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin CMS</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="admin">
  <div class="shell page-shell admin-shell">
    <header class="topbar">
      <a href="index.html" class="brand-block">
        <span class="brand-kicker">THE TASTE</span>
        <strong>Admin CMS (Firebase)</strong>
      </a>
      <div class="topbar-actions">
        <button class="btn small" id="seedFirestoreBtn">Seed Firestore Menu</button>
        <button class="btn small secondary" id="adminLogoutBtn">Logout</button>
      </div>
    </header>

    <section id="adminApp" class="hidden">
      <div class="toolbar admin-toolbar">
        <input id="adminSearch" class="search-input" type="text" placeholder="Search item..." />
        <select id="adminCategoryFilter" class="select-input"></select>
        <select id="adminStatusFilter" class="select-input">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="hidden">Hidden</option>
          <option value="soldout">Sold Out</option>
        </select>
        <button class="btn primary" id="addItemBtn">Add New Item</button>
      </div>

      <div id="adminList" class="admin-list"></div>

      <section class="section-intro" style="margin-top:28px">
        <h1 style="font-size:30px">User Profiles</h1>
        <p>สร้าง Auth account ใน Firebase Authentication ก่อน แล้วค่อยเพิ่ม profile/role ตรงนี้</p>
      </section>
      <div class="toolbar admin-toolbar">
        <button class="btn primary" id="addUserBtn">Add User Profile</button>
      </div>
      <div id="userList" class="admin-list"></div>
    </section>
  </div>

  <div id="adminLoginModal" class="modal hidden"></div>
  <div id="adminEditorModal" class="modal hidden"></div>
  <div id="userEditorModal" class="modal hidden"></div>
  <script type="module" src="assets/app-firebase.js"></script>
</body>
</html>
